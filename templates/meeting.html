{% extends "base.html" %}
{% block title %}Meeting{% endblock %}
{% block content %}

<div id="jitsi-container" style="height: 600px;"></div>
<video id="bgVideo" autoplay playsinline style="display:none" width="360" height="270"></video>
<canvas id="bgCanvas" width="360" height="270" style="display:none"></canvas>

<div id="alertBox" style="display:none" class="alert alert-danger position-fixed top-0 start-50 translate-middle-x mt-3">
    ⚠️ Unidentified face detected in frame.
</div>

<script src="https://meet.jit.si/external_api.js"></script>
<script>
const meetingCode = "{{ meeting.meeting_code }}";
const role = "{{ role }}";
const name = "{{ name }}";

const domain = "meet.jit.si";
const options = {
    roomName: "InterviewSecurity-" + meetingCode,
    width: "100%",
    height: 600,
    parentNode: document.querySelector('#jitsi-container'),
    userInfo: { displayName: name },
    configOverwrite: { startWithVideoMuted: false },
    interfaceConfigOverwrite: {
        TOOLBAR_BUTTONS: ['microphone', 'camera', 'closedcaptions', 'desktop', 'fullscreen',
            'fodeviceselection', 'hangup', 'chat', 'raisehand', 'tileview']
    }
};
const api = new JitsiMeetExternalAPI(domain, options);

// Jitsi's own "call ended" screen was staying up forever with monitoring
// still running in the background — these events fire when the user
// actually hangs up or the call ends, so we stop everything and leave.
api.addEventListener('readyToClose', () => {
    clearInterval(presenceInterval);
    window.location.href = '/';
});
api.addEventListener('videoConferenceLeft', () => {
    clearInterval(presenceInterval);
    window.location.href = '/';
});

// only the interviewer sees end-meeting security controls
if (role !== 'interviewer') {
    // candidates keep the standard Jitsi controls; host-only powers stay with interviewer
}

fetch('/api/log-event', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ meeting_code: meetingCode, event_type: 'joined', details: `${name} (${role})` })
});

// ---- Background presence monitoring (simplified V1) ----
const bgVideo = document.getElementById('bgVideo');
const bgCanvas = document.getElementById('bgCanvas');
let noFaceTimer = null;
const NO_FACE_TIMEOUT_MS = 10000;
let consecutiveDenied = 0;
const DENIED_TOLERANCE = 2; // require 2 misses in a row before flagging — tolerates a head turn or glance away

let presenceInterval = null;

navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
    bgVideo.srcObject = stream;
    presenceInterval = setInterval(checkPresence, 5000);
}).catch(() => console.log('Background monitoring camera unavailable'));

async function checkPresence() {
    const ctx = bgCanvas.getContext('2d');
    ctx.drawImage(bgVideo, 0, 0, bgCanvas.width, bgCanvas.height);
    const image = bgCanvas.toDataURL('image/jpeg', 0.8);

    const res = await fetch('/api/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image, meeting_code: meetingCode })
    });
    const data = await res.json();

    if (data.status === 'matched') {
        clearTimeout(noFaceTimer);
        noFaceTimer = null;
        consecutiveDenied = 0;
    } else if (data.status === 'no_face') {
        if (!noFaceTimer) {
            noFaceTimer = setTimeout(() => {
                fetch('/api/log-event', {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ meeting_code: meetingCode, event_type: 'auto_ended', details: 'No face for 10s' })
                });
                clearInterval(presenceInterval);
                alert('No face detected for 10 seconds. Ending meeting.');
                api.executeCommand('hangup');
                window.location.href = '/';
            }, NO_FACE_TIMEOUT_MS);
        }
    } else if (data.status === 'denied') {
        consecutiveDenied++;
        if (consecutiveDenied >= DENIED_TOLERANCE) {
            document.getElementById('alertBox').style.display = 'block';
            fetch('/api/log-event', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ meeting_code: meetingCode, event_type: 'unknown_face_alert', details: `distance=${data.distance}` })
            });
            setTimeout(() => { document.getElementById('alertBox').style.display = 'none'; }, 5000);
        }
    }
}
</script>
{% endblock %}
